<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Third Web Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="container">

    <header>
        My Web Site Brand
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="page2.html">About</a></li>
            <li><a href="page2.html">Gallery</a></li>
            <li><a href="page3.html">Contact</a></li>
        </ul>
    </nav>

    <main>
        <h1>My Third Heading</h1>
        <p>My Third paragraph.</p>

        <form action="#" method="post">
            <div class="form-group">
                <label for="fullname">*User personal information</label>
                <input type="text" id="fullname" name="fullname" placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label for="email">Enter your email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="website">Enter your website</label>
                <input type="text" id="website" name="website" placeholder="Enter your website">
            </div>

            <div class="form-group">
                <label>Select your gender</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="male"> Male</label>
                    <label><input type="radio" name="gender" value="female"> Female</label>
                </div>
            </div>

            <div class="form-group">
                <label for="comment">How should we contact you?</label>
                <input type="text" id="comment" name="comment">
            </div>

            <div class="form-group">
                <label for="comments">Tell us the reason of your visit today.</label>
                <textarea id="comments" name="comments"></textarea>
            </div>

            <input type="submit" value="sign up">
        </form>
    </main>

    <footer>
        &copy; Copyright 2020
    </footer>

</div>

</body>
</html>
