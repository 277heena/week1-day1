<!DOCTYPE html>
<html>

<head>
    <title>Architecture Contact Form</title>
    <meta charset="UTF-8">
</head>

<body>

<div id="container">

    <header>
        Heena's Architecture Studio
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="page2.html">Projects</a></li>
            <li><a href="page3.html">Contact</a></li>
            <li><a href="page3.html">Join</a></li>
        </ul>
    </nav>

    <main>
        <h1>Get in Touch</h1>

        <p>
            Use this form to share your design interest, project ideas, or architecture questions.
        </p>

        <img src="images/architecture2.jpg" alt="Architecture design sketch" width="500">

        <form action="/signup" method="post">
            <fieldset>
                <legend>User personal information</legend>

                <label>Enter your full name:</label><br>
                <input type="text" name="name"><br>

                <label>Enter your email:</label><br>
                <input type="email" name="email"><br>

                <label>Enter your phone:</label><br>
                <input type="text" name="phone"><br><br>

                <label>Select your gender</label><br>
                <input type="radio" name="gender" value="male">Male
                <input type="radio" name="gender" value="female">Female

                <br><br>

                <label>How should we contact you?</label><br>
                <select>
                    <option>Email</option>
                    <option>Phone</option>
                </select>

                <br><br>

                <label>Tell us the reason for your visit today:</label><br>
                <textarea rows="5" cols="30"></textarea>

                <br><br>

                <input type="submit" value="sign-up">
            </fieldset>
        </form>
    </main>

    <footer>
        © Copyright 2020
    </footer>

</div>

</body>
</html>
